<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MasterFlet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body{margin:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#0f172a}

        .sidebar{
            width:280px;height:100vh;background:#132235;color:white;
            position:fixed;left:0;top:0;padding:24px 22px;
            transition:.3s;overflow:hidden;z-index:1000
        }

        .sidebar.closed{width:0;padding-left:0;padding-right:0}

        .logo{
            display:flex;align-items:center;gap:12px;
            font-size:28px;font-weight:bold;margin-bottom:42px;white-space:nowrap
        }

        .logo span:first-child{font-size:42px}

        .menu a{
            display:flex;align-items:center;gap:14px;color:#e5edf7;
            text-decoration:none;padding:13px 14px;border-radius:7px;
            margin-bottom:7px;font-size:17px;white-space:nowrap
        }

        .menu a:hover,.menu a.active{background:#28548d;color:white}

        .submenu{margin-left:14px;margin-bottom:14px}
        .submenu a{font-size:16px;padding:11px 14px}

        .logout{
            position:absolute;bottom:24px;left:22px;right:22px;
            border:1px solid #43546b;color:white;text-decoration:none;
            padding:13px;border-radius:7px;text-align:center;white-space:nowrap
        }

        .main{margin-left:280px;min-height:100vh;transition:.3s}
        .main.expanded{margin-left:0}

        .topbar{
            height:76px;background:white;border-bottom:1px solid #e5e7eb;
            display:flex;justify-content:space-between;align-items:center;
            padding:0 34px
        }

        .top-left{display:flex;align-items:center;gap:22px;font-size:24px;font-weight:bold}
        .menu-toggle{cursor:pointer;font-size:24px}

        .user{display:flex;align-items:center;gap:10px}
        .user i{font-size:32px;color:#6b7280}

        .content{padding:32px 36px}

        .panel{
            background:white;border:1px solid #e5e7eb;border-radius:8px;
            padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.04);
            margin-bottom:24px;
        }

        .btn-azul{
            background:#2563eb;color:white;text-decoration:none;
            padding:11px;border-radius:6px;text-align:center;display:block
        }

        .form-control, .form-select{
            height:45px;
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="logo">
        <span>🚚</span>
        <span>MasterFlet</span>
    </div>

    <div class="menu">
        <a href="/">
            <i class="fa-solid fa-house"></i> Inicio
        </a>

        <a href="/viajes/">
            <i class="fa-solid fa-truck"></i> Viajes
        </a>

        <div class="submenu">
            <a href="/viajes/">
                <i class="fa-solid fa-list"></i> Todos los viajes
            </a>

            <a href="/crear/">
                <i class="fa-solid fa-plus"></i> Nuevo viaje
            </a>

            <a href="/archivados/">
                <i class="fa-solid fa-folder"></i> Archivados
            </a>
        </div>

        <a href="/reportes/">
            <i class="fa-solid fa-chart-line"></i> Reportes
        </a>

        <a href="/admin/">
            <i class="fa-solid fa-gear"></i> Admin
        </a>
    </div>

    <a href="/logout/" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
    </a>
</div>

<div class="main" id="main">

    <div class="topbar">
        <div class="top-left">
            <i class="fa-solid fa-bars menu-toggle" id="toggleSidebar"></i>
            <span>{% block titulo %}Inicio{% endblock %}</span>
        </div>

        <div class="user">
            <i class="fa-solid fa-circle-user"></i>
            <div>
                <strong>marcos</strong><br>
                <small>Administrador</small>
            </div>
        </div>
    </div>

    <div class="content">
        {% block contenido %}
        {% endblock %}
    </div>

</div>

<script>
    const toggleSidebar = document.getElementById("toggleSidebar");
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main");

    toggleSidebar.addEventListener("click", function () {
        sidebar.classList.toggle("closed");
        main.classList.toggle("expanded");
    });
</script>

</body>
</html>
