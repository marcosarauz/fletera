<!DOCTYPE html>
<html>
<head>
    <title>Finalizar viaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Finalizar viaje</h2>

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <div class="card p-4">

        <p><strong>{{ viaje.cliente }}</strong></p>
        <p>{{ viaje.origen }} → {{ viaje.destino }}</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Chofer</label>
                <select name="chofer" class="form-control" required>
                    <option value="">Seleccionar chofer</option>
                    {% for chofer in choferes %}
                        <option value="{{ chofer.id }}">
                            {{ chofer.nombre }} {{ chofer.apellido }} - {{ chofer.camioneta }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Horas trabajadas</label>
                <input type="number" name="horas" class="form-control" min="0" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Minutos trabajados</label>
                <input type="number" name="minutos" class="form-control" min="0" max="59" required>
            </div>

            <button class="btn btn-success">Finalizar y calcular</button>
            <a href="/" class="btn btn-secondary">Volver</a>
            <a href="/admin/" class="btn btn-outline-dark">Ir al admin</a>
        </form>

    </div>

</div>

</body>
</html>
