<!DOCTYPE html>
<html>
<head>
    <title>Nuevo viaje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">➕ Crear viaje</h2>

    <div class="card p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nombre del cliente</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input 
                    type="tel"
                    name="telefono"
                    class="form-control"
                    pattern="[0-9]+"
                    title="Solo números"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">Origen</label>
                <input type="text" name="origen" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Destino</label>
                <input type="text" name="destino" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Hora</label>
                <input type="time" name="hora" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" name="precio" class="form-control" min="0" step="0.01">
            </div>

            <div class="mb-3">
                <label class="form-label">Observaciones</label>
                <textarea name="observaciones" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-success">Guardar viaje</button>
            <a href="/" class="btn btn-secondary">Volver</a>

        </form>

    </div>

</div>

</body>
</html>
