<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear viaje</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 GOOGLE MAPS -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCXCdylDYAfs1hHkUJAAZ15lpa7jERovNk&libraries=places"></script>

    <style>
        body {
            background: #f5f6fa;
        }

        .container {
            margin-top: 40px;
            max-width: 800px;
        }

        .card {
            padding: 25px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>➕ Crear viaje</h2>

    <div class="card mt-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Nombre del cliente</label>
                <input type="text" name="cliente" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Teléfono</label>
                <input type="text" name="telefono" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Origen</label>
                <input type="text" id="origen" name="origen" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Destino</label>
                <input type="text" id="destino" name="destino" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Hora</label>
                <input type="time" name="hora" class="form-control" required>
            </div>

            <div class="alert alert-info">
                El precio se calcula automáticamente cuando finalizás el viaje.
            </div>

            <div class="mb-3">
                <label>Observaciones</label>
                <textarea name="observaciones" class="form-control"></textarea>
            </div>

            <button class="btn btn-success">Guardar viaje</button>
            <a href="/" class="btn btn-secondary">Volver</a>

        </form>
    </div>
</div>

<!-- 🔥 AUTOCOMPLETE GOOGLE (TIPO UBER) -->
<script>
function initAutocomplete() {

    const origen = new google.maps.places.Autocomplete(
        document.getElementById("origen"),
        { componentRestrictions: { country: "ar" } }
    );

    const destino = new google.maps.places.Autocomplete(
        document.getElementById("destino"),
        { componentRestrictions: { country: "ar" } }
    );

}

google.maps.event.addDomListener(window, 'load', initAutocomplete);
</script>

</body>
</html>
