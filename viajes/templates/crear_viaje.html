{% extends "base.html" %}

{% block titulo %}Crear viaje{% endblock %}

{% block contenido %}

<div class="panel">
    <h2 class="mb-4">➕ Crear viaje</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select name="cliente" class="form-select" required>
                {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Chofer</label>
            <select name="chofer" class="form-select" required>
                {% for c in choferes %}
                    <option value="{{ c.id }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Camioneta</label>
            <select name="camioneta" class="form-select" required>
                {% for c in camionetas %}
                    <option value="{{ c.id }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Origen</label>
            <input type="text" name="origen" id="origen" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Destino</label>
            <input type="text" name="destino" id="destino" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" name="fecha" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Hora</label>
            <input type="time" name="hora" class="form-control" required>
        </div>

        <div class="alert alert-info">
            El precio se calcula automáticamente cuando finalizás el viaje.
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Guardar viaje
        </button>
    </form>
</div>

<script>
function initAutocomplete() {
    const origen = document.getElementById("origen");
    const destino = document.getElementById("destino");

    if (origen) {
        new google.maps.places.Autocomplete(origen, {
            componentRestrictions: { country: "ar" },
            fields: ["formatted_address", "geometry", "name"]
        });
    }

    if (destino) {
        new google.maps.places.Autocomplete(destino, {
            componentRestrictions: { country: "ar" },
            fields: ["formatted_address", "geometry", "name"]
        });
    }
}
</script>

<script
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initAutocomplete"
    async defer>
</script>

{% endblock %}
